<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Marquee</title>
    <style>
      :root {
        color-scheme: dark;
        color: #111;
        background: transparent;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          'Segoe UI', sans-serif;
        font-size: 1rem;
        line-height: 1.5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
      }

      .marquee-shell {
        width: min(100%, 1200px);
        border: 1px solid rgba(17, 17, 17, 0.14);
        border-radius: 18px;
        backdrop-filter: blur(14px);
        padding: 1rem 1.25rem;
        background: rgba(255, 255, 255, 0.02);
        box-shadow: 0 20px 90px rgba(15, 15, 15, 0.08);
      }

      .marquee-title {
        margin: 0 0 0.75rem;
        font-size: 0.95rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 600;
        color: rgba(17, 17, 17, 0.85);
      }

      .marquee-frame {
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(17, 17, 17, 0.12);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      .marquee-inner {
        display: flex;
        align-items: center;
        white-space: nowrap;
        gap: 2rem;
        animation: marquee 22s linear infinite;
      }

      .marquee-frame:hover .marquee-inner,
      .marquee-frame:focus-within .marquee-inner {
        animation-play-state: paused;
      }

      .marquee-item {
        display: inline-flex;
        align-items: center;
        gap: 0.8rem;
      }

      .marquee-item a {
        color: #111;
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
      }

      .marquee-item a:hover,
      .marquee-item a:focus-visible {
        text-decoration: underline;
        outline: none;
      }

      .marquee-item span {
        color: rgba(17, 17, 17, 0.64);
        font-size: 0.86rem;
        letter-spacing: 0.08em;
      }

      .marquee-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 4.5rem;
        color: rgba(17, 17, 17, 0.6);
      }

      @keyframes marquee {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .marquee-inner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <section class="marquee-shell" aria-label="Top news headlines ticker">
      <h1 class="marquee-title">Latest headlines</h1>
      <div class="marquee-frame" tabindex="0">
        <div class="marquee-inner" id="marqueeContent" aria-live="polite"></div>
        <div class="marquee-placeholder" id="marqueePlaceholder">Loading news…</div>
      </div>
    </section>

    <script>
      const feedUrl = 'news.json';
      const marqueeContent = document.getElementById('marqueeContent');
      const placeholder = document.getElementById('marqueePlaceholder');

      function createItem(item) {
        const itemWrapper = document.createElement('div');
        itemWrapper.className = 'marquee-item';

        const link = document.createElement('a');
        link.href = item.link;
        link.target = '_blank';
        link.rel = 'noopener';
        link.textContent = item.title;
        link.setAttribute('aria-label', `${item.title} from ${item.source}`);

        const sourceLabel = document.createElement('span');
        sourceLabel.textContent = item.source;

        itemWrapper.append(link, sourceLabel);
        return itemWrapper;
      }

      async function loadNews() {
        try {
          const response = await fetch(feedUrl, { cache: 'no-cache' });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const items = await response.json();
          if (!Array.isArray(items) || items.length === 0) {
            throw new Error('No news items found');
          }

          placeholder.style.display = 'none';
          marqueeContent.innerHTML = '';

          items.slice(0, 10).forEach((item) => {
            marqueeContent.append(createItem(item));
          });
          items.slice(0, 10).forEach((item) => {
            marqueeContent.append(createItem(item));
          });
        } catch (error) {
          placeholder.textContent = 'Unable to load news at this time.';
          console.error(error);
        }
      }

      loadNews();
    </script>
  </body>
</html>
