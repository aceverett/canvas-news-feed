<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Marquee</title>
    <style>
      :root {
        color-scheme: light;
        color: #f7f7f5;
        background: transparent;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          'Segoe UI', sans-serif;
        font-size: 1rem;
        line-height: 1.5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        padding: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
      }

      .marquee-shell {
        width: min(100%, 1200px);
        border: 1px solid rgba(17, 17, 17, 0.14);
        border-radius: 18px;
        backdrop-filter: blur(14px);
        padding: 1rem 1.25rem;
        background: rgba(255, 255, 255, 0.02);
        box-shadow: 0 20px 90px rgba(15, 15, 15, 0.08);
      }

      .marquee-title {
        margin: 0 0 0.75rem;
        font-size: 0.95rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 600;
        color: rgba(17, 17, 17, 0.85);
      }

      .marquee-frame {
        overflow: hidden;
        display: flex;
        flex-direction: column;
        width: 100%;
        border: 1px solid rgba(17, 17, 17, 0.12);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      .marquee-track {
        display: flex;
        width: max-content;
        animation: scrollContinuous 66s linear infinite;
      }

      .marquee-track:hover,
      .marquee-track:focus-within {
        animation-play-state: paused;
      }

      .marquee-item {
        display: inline-flex;
        align-items: center;
        gap: 0.8rem;
      }

      .scroll-content {
        display: inline-flex;
        align-items: center;
        gap: 1.5rem;
        padding-right: 2rem;
      }

      .marquee-item a {
        color: #111;
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
      }

      .marquee-item a:hover,
      .marquee-item a:focus-visible {
        text-decoration: underline;
        outline: none;
      }

      .marquee-item span {
        color: rgba(17, 17, 17, 0.64);
        font-size: 0.86rem;
        letter-spacing: 0.08em;
      }

      .marquee-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 4.5rem;
        color: rgba(17, 17, 17, 0.6);
      }

      @keyframes scrollContinuous {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .marquee-track {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <section class="marquee-shell" aria-label="Top news headlines ticker">
      <h1 class="marquee-title">Latest headlines</h1>
      <div class="marquee-frame" tabindex="0">
        <div class="marquee-track" id="marqueeContent" aria-live="polite"></div>
        <div class="marquee-placeholder" id="marqueePlaceholder">Loading news…</div>
      </div>
    </section>

    <script>
      const feedUrl = 'news.json';
      const marqueeContent = document.getElementById('marqueeContent');
      const placeholder = document.getElementById('marqueePlaceholder');

      function createItemMarkup(item) {
        return `
          <div class="marquee-item">
            <a href="${item.link}" target="_blank" rel="noopener" aria-label="${item.title} from ${item.source}">
              ${item.title}
            </a>
            <span>${item.source}</span>
          </div>
        `;
      }

      async function loadNews() {
        try {
          const response = await fetch(feedUrl, { cache: 'no-cache' });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const items = await response.json();
          if (!Array.isArray(items) || items.length === 0) {
            throw new Error('No news items found');
          }

          placeholder.style.display = 'none';

          const headlines = items.slice(0, 10).map(createItemMarkup).join('');
          marqueeContent.innerHTML = `
            <div class="scroll-content">${headlines}</div>
            <div class="scroll-content" aria-hidden="true">${headlines}</div>
          `;
        } catch (error) {
          placeholder.textContent = 'Unable to load news at this time.';
          console.error(error);
        }
      }

      async function applyConfig() {
        try {
          const response = await fetch('config.json', { cache: 'no-cache' });
          if (!response.ok) return;
          const config = await response.json();
          const titleEl = document.querySelector('.marquee-title');
          if (titleEl) titleEl.textContent = config.project_title || titleEl.textContent;
          if (config.project_title) document.title = config.project_title;
        } catch (err) {
          console.debug('applyConfig error', err);
        }
      }

      applyConfig();
      loadNews();
    </script>
  </body>
</html>
