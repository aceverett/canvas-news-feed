<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Marquee</title>
    <style>
      :root {
        color-scheme: light;
        color: #111111;
        background: transparent;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          'Segoe UI', sans-serif;
        font-size: 1rem;
        line-height: 1.5;
      }

      * {
        box-sizing: border-box;
      }

      /* 🛠️ FIX 1: Strip padding/margins and set background to transparent so it takes Canvas's color */
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
      }

      /* 🛠️ FIX 2: Flatten the shell. Remove the rigid max-width, border, and the cut-off shadow */
      .marquee-shell {
        width: 100%;
        padding: 0.5rem 0;
        background: transparent;
      }

      .marquee-title {
        margin: 0 0 0.5rem 0;
        font-size: 0.85rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        font-weight: 700;
        color: rgba(17, 17, 17, 0.6);
      }

      /* 🛠️ FIX 3: Simplify the frame to let text slide edge-to-edge naturally */
      .marquee-frame {
        overflow: hidden;
        display: flex;
        flex-direction: column;
        width: 100%;
        background: transparent;
      }

      .marquee-track {
        display: flex;
        width: max-content;
        animation: scrollContinuous 45s linear infinite;
      }

      .marquee-track:hover,
      .marquee-track:focus-within {
        animation-play-state: paused;
      }

      .marquee-item {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
      }

      .scroll-content {
        display: inline-flex;
        align-items: center;
        gap: 2.5rem;
        padding-right: 2.5rem;
      }

      .marquee-item a {
        color: #111111;
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
      }

      .marquee-item a:hover,
      .marquee-item a:focus-visible {
        text-decoration: underline;
        outline: none;
      }

      .marquee-item span {
        color: rgba(17, 17, 17, 0.45);
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        background: rgba(17, 17, 17, 0.05);
        padding: 0.2rem 0.5rem;
        border-radius: 6px;
      }

      .marquee-placeholder {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        min-height: 2rem;
        color: rgba(17, 17, 17, 0.5);
        font-size: 0.95rem;
      }

      @keyframes scrollContinuous {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .marquee-track {
          animation: none;
        }
      }

      /* 📱 MOBILE APP & TOUCH VIEW OVERRIDES */
      @media (max-width: 768px), (pointer: coarse) {
        body {
          padding: 0.25rem;
        }

        .marquee-frame {
          overflow-x: auto;
          scroll-snap-type: x mandatory;
          -webkit-overflow-scrolling: touch;
        }

        .marquee-track {
          animation: none !important;
          width: auto;
          display: flex;
          gap: 1.5rem;
          padding: 0.5rem 0;
        }

        .scroll-content {
          display: flex;
          gap: 1.5rem;
          padding-right: 0;
        }

        .scroll-content[aria-hidden="true"] {
          display: none !important;
        }

        .marquee-item {
          scroll-snap-align: start;
          flex-shrink: 0;
          background: rgba(17, 17, 17, 0.03);
          padding: 0.5rem 0.75rem;
          border-radius: 10px;
          border: 1px solid rgba(17, 17, 17, 0.05);
        }
      }
    </style>
  </head>
  <body>
    <section class="marquee-shell" aria-label="Top news headlines ticker">
      <h1 class="marquee-title">Latest headlines</h1>
      <div class="marquee-frame" tabindex="0">
        <div class="marquee-track" id="marqueeContent" aria-live="polite"></div>
        <div class="marquee-placeholder" id="marqueePlaceholder">Loading news…</div>
      </div>
    </section>

    <script>
      const feedUrl = 'news.json';
      const marqueeContent = document.getElementById('marqueeContent');
      const placeholder = document.getElementById('marqueePlaceholder');

      function createItemMarkup(item) {
        return `
          <div class="marquee-item">
            <a href="${item.link}" target="_blank" rel="noopener" aria-label="${item.title} from ${item.source}">
              ${item.title}
            </a>
            <span>${item.source}</span>
          </div>
        `;
      }

      async function loadNews() {
        try {
          const response = await fetch(feedUrl, { cache: 'no-cache' });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const items = await response.json();
          if (!Array.isArray(items) || items.length === 0) {
            throw new Error('No news items found');
          }

          placeholder.style.display = 'none';

          const headlines = items.slice(0, 10).map(createItemMarkup).join('');
          marqueeContent.innerHTML = `
            <div class="scroll-content">${headlines}</div>
            <div class="scroll-content" aria-hidden="true">${headlines}</div>
          `;
        } catch (error) {
          placeholder.textContent = 'Unable to load news at this time.';
          console.error(error);
        }
      }

      async function applyConfig() {
        try {
          const response = await fetch('config.json', { cache: 'no-cache' });
          if (!response.ok) return;
          const config = await response.json();
          const titleEl = document.querySelector('.marquee-title');
          if (titleEl) titleEl.textContent = config.project_title || titleEl.textContent;
          if (config.project_title) document.title = config.project_title;
        } catch (err) {
          console.debug('applyConfig error', err);
        }
      }

      applyConfig();
      loadNews();
    </script>
  </body>
</html>
